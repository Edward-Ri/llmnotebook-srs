openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI辅助学习与间隔重复系统 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session
  - name: documents
    description: Document and keyword operations
  - name: cards
    description: Card generation and validation
  - name: reviews
    description: Spaced repetition review operations
  - name: analytics
    description: Learning analytics
  - name: decks
    description: Deck management and card grouping
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"

  /auth/guest:
    post:
      operationId: guest
      tags: [auth]
      summary: 创建访客会话
      responses:
        "200":
          description: 访客 token 与用户信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestAuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: 获取当前用户
      responses:
        "200":
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: 退出登录
      responses:
        "200":
          description: 退出结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /documents/analyze:
    post:
      operationId: analyzeDocument
      tags: [documents]
      summary: 分析文档并提取关键词
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeDocumentRequest"
      responses:
        "200":
          description: 分析结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeDocumentResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: 获取所有文档列表
      responses:
        "200":
          description: 文档列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"

  /documents/{documentId}/keywords:
    get:
      operationId: getDocumentKeywords
      tags: [documents]
      summary: 获取文档关键词
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 关键词列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordListResponse"
    put:
      operationId: updateKeywordSelections
      tags: [documents]
      summary: 更新关键词选择状态
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKeywordsRequest"
      responses:
        "200":
          description: 更新结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordListResponse"

  /cards/generate:
    post:
      operationId: generateCards
      tags: [cards]
      summary: 基于选中关键词生成候选卡片
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCardsRequest"
      responses:
        "200":
          description: 生成的卡片列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardListResponse"

  /cards/pending:
    get:
      operationId: getPendingCards
      tags: [cards]
      summary: 获取待校验的卡片
      parameters:
        - name: documentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 待校验卡片列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardListResponse"

  /cards/validate/batch:
    put:
      operationId: validateCardsBatch
      tags: [cards]
      summary: 批量校验卡片
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCardsBatchRequest"
      responses:
        "200":
          description: 校验结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchValidationResponse"

  /cards/batch-assign-deck:
    patch:
      operationId: batchAssignDeck
      tags: [cards]
      summary: 批量分配卡片到卡片组
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchAssignDeckRequest"
      responses:
        "200":
          description: 更新结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssignDeckResponse"

  /reviews/due:
    get:
      operationId: getDueCards
      tags: [reviews]
      summary: 获取今日到期复习卡片
      parameters:
        - name: deckId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: 到期卡片列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DueCardsResponse"

  /decks:
    get:
      operationId: listDecks
      tags: [decks]
      summary: 获取所有卡片组列表
      responses:
        "200":
          description: 卡片组列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeckListResponse"
    post:
      operationId: createDeck
      tags: [decks]
      summary: 创建新的卡片组
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeckRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeckSummary"

  /decks/{id}:
    get:
      operationId: getDeck
      tags: [decks]
      summary: 获取单个卡片组详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 卡片组详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeckDetail"

  /reviews/log:
    post:
      operationId: logReview
      tags: [reviews]
      summary: 记录复习结果并更新SM-2参数
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogReviewRequest"
      responses:
        "200":
          description: 更新后的卡片
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewLogResponse"

  /analytics/heatmap:
    get:
      operationId: getHeatmapData
      tags: [analytics]
      summary: 获取学习热力图数据
      responses:
        "200":
          description: 热力图数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatmapResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
      required:
        - id
        - email

    AuthUserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - user

    GuestAuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - token
        - user

    LogoutResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    AnalyzeDocumentRequest:
      type: object
      properties:
        content:
          type: string
          description: 原始文本内容
        title:
          type: string
          description: 文档标题
      required:
        - content

    AnalyzeDocumentResponse:
      type: object
      properties:
        documentId:
          type: string
          format: uuid
        title:
          type: string
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/Keyword"
        toc:
          type: array
          items:
            $ref: "#/components/schemas/TOCNode"
      required:
        - documentId
        - keywords
        - toc

    Keyword:
      type: object
      properties:
        id:
          type: string
          format: uuid
        word:
          type: string
        isSelected:
          type: boolean
        documentId:
          type: string
          format: uuid
      required:
        - id
        - word
        - isSelected
        - documentId

    KeywordListResponse:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/Keyword"
      required:
        - keywords

    TOCKeyword:
      type: object
      properties:
        id:
          type: string
          format: uuid
        word:
          type: string
      required:
        - id
        - word

    TOCNode:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        startIndex:
          type: integer
        endIndex:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/TOCNode"
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/TOCKeyword"
      required:
        - id
        - title
        - startIndex
        - endIndex
        - children
        - keywords

    UpdateKeywordsRequest:
      type: object
      properties:
        selectedIds:
          type: array
          items:
            type: string
            format: uuid
      required:
        - selectedIds

    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
        keywordCount:
          type: integer
        cardCount:
          type: integer
      required:
        - id
        - title
        - content
        - createdAt

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
      required:
        - documents

    GenerateCardsRequest:
      type: object
      properties:
        documentId:
          type: string
          format: uuid
        keywordIds:
          type: array
          items:
            type: string
            format: uuid
      required:
        - documentId
        - keywordIds

    Card:
      type: object
      properties:
        id:
          type: string
          format: uuid
        frontContent:
          type: string
        backContent:
          type: string
        status:
          type: string
          enum: [pending_validation, active, discarded]
        keywordId:
          type: string
          format: uuid
          nullable: true
        keyword:
          type: string
        sm2Interval:
          type: integer
        sm2Repetition:
          type: integer
        sm2Efactor:
          type: number
        dueDate:
          type: string
      required:
        - id
        - frontContent
        - backContent
        - status
        - keywordId

    CardListResponse:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: "#/components/schemas/Card"
        total:
          type: integer
      required:
        - cards
        - total

    CardValidationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum: [keep, edit, discard]
        frontContent:
          type: string
        backContent:
          type: string
      required:
        - id
        - action

    ValidateCardsBatchRequest:
      type: object
      properties:
        validations:
          type: array
          items:
            $ref: "#/components/schemas/CardValidationItem"
      required:
        - validations

    BatchValidationResponse:
      type: object
      properties:
        processed:
          type: integer
        kept:
          type: integer
        discarded:
          type: integer
      required:
        - processed
        - kept
        - discarded

    DeckSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        totalCards:
          type: integer
        dueCards:
          type: integer
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - totalCards
        - dueCards

    DeckListResponse:
      type: object
      properties:
        decks:
          type: array
          items:
            $ref: "#/components/schemas/DeckSummary"
      required:
        - decks

    DeckCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        frontContent:
          type: string
        backContent:
          type: string
        status:
          type: string
        keywordId:
          type: string
          format: uuid
          nullable: true
        keyword:
          type: string
        dueDate:
          type: string
        documentId:
          type: string
          format: uuid
        documentTitle:
          type: string
      required:
        - id
        - frontContent
        - backContent
        - status
        - keywordId

    DeckDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        totalCards:
          type: integer
        dueCards:
          type: integer
        cards:
          type: array
          items:
            $ref: "#/components/schemas/DeckCard"
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - totalCards
        - dueCards
        - cards

    CreateDeckRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name

    BatchAssignDeckRequest:
      type: object
      properties:
        assignments:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              deckId:
                type: string
                format: uuid
                nullable: true
            required:
              - id
      required:
        - assignments

    BatchAssignDeckResponse:
      type: object
      properties:
        updated:
          type: integer
      required:
        - updated

    DueCardsResponse:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: "#/components/schemas/Card"
        total:
          type: integer
        todayReviewed:
          type: integer
      required:
        - cards
        - total
        - todayReviewed

    LogReviewRequest:
      type: object
      properties:
        cardId:
          type: string
          format: uuid
        grade:
          type: integer
          minimum: 0
          maximum: 5
          description: "0=完全遗忘, 3=艰难回想, 5=完美记忆"
      required:
        - cardId
        - grade

    ReviewLogResponse:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/Card"
        nextDueDate:
          type: string
        newInterval:
          type: integer
      required:
        - card
        - nextDueDate
        - newInterval

    AnalyticsSummary:
      type: object
      properties:
        totalCards:
          type: integer
        activeCards:
          type: integer
        totalReviews:
          type: integer
        todayReviews:
          type: integer
        retentionRate:
          type: number
        streak:
          type: integer
        dueToday:
          type: integer
      required:
        - totalCards
        - activeCards
        - totalReviews
        - todayReviews
        - retentionRate
        - streak
        - dueToday

    HeatmapData:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
      required:
        - date
        - count

    HeatmapResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapData"
      required:
        - data
