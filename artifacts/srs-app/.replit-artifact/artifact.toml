kind = "web"
previewPath = "/"
title = "AI辅助学习与间隔重复系统"
version = "1.0.0"
id = "artifacts/srs-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24140
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/srs-app run dev"

[services.env]
PORT = "24140"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/srs-app", "run", "build"]
publicDir = "artifacts/srs-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
